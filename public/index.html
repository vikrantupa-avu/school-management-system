<!doctype html>
<html lang="en">
  <head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>School Management • Welcome</title><link rel="stylesheet" href="/styles.css" /></head>
  <body>
    <main class="page">
      <section class="hero">
        <h1>School Management System</h1>
        <p>Beautiful multi-screen web app for operations: authentication, dashboards, and dedicated pages per module.</p>
        <div id="session"></div>
      </section>

      <div class="grid grid-2" style="margin-top:1rem">
        <section class="card">
          <h2>Login</h2>
          <form id="login-form">
            <label>Email<input name="email" type="email" required /></label>
            <label>Password<input name="password" type="password" required /></label>
            <button type="submit">Login & Go to Dashboard</button>
          </form>
        </section>

        <section class="card">
          <h2>Register</h2>
          <form id="register-form">
            <label>Name<input name="name" required /></label>
            <label>Email<input name="email" type="email" required /></label>
            <label>Password<input name="password" type="password" required /></label>
            <label>Role
              <select name="role">
                <option value="admin">admin</option><option value="staff">staff</option><option value="teacher">teacher</option>
                <option value="student">student</option><option value="parent">parent</option><option value="finance">finance</option>
              </select>
            </label>
            <button class="secondary" type="submit">Create account</button>
          </form>
        </section>
      </div>

      <section class="card"><h3>Response</h3><pre id="output">Sign in to enter the app.</pre></section>
    </main>
    <script type="module" src="/js/index.js"></script>
  </body>
</html>
