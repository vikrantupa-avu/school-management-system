<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>School Management System</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>School Management System</h1>
      <p>JavaScript full-stack starter with authentication, role-based access, and core school modules.</p>

      <section>
        <h2>Quick start</h2>
        <ol>
          <li>Register an admin user.</li>
          <li>Log in and copy token.</li>
          <li>Use token to call module APIs.</li>
        </ol>
      </section>

      <section class="card">
        <h3>Register</h3>
        <form id="register-form">
          <input name="name" placeholder="Name" required />
          <input name="email" placeholder="Email" type="email" required />
          <input name="password" placeholder="Password (min 8 chars)" type="password" required />
          <select name="role">
            <option value="admin">admin</option>
            <option value="staff">staff</option>
            <option value="teacher">teacher</option>
            <option value="student">student</option>
            <option value="finance">finance</option>
            <option value="parent">parent</option>
          </select>
          <button type="submit">Register</button>
        </form>
      </section>

      <section class="card">
        <h3>Login</h3>
        <form id="login-form">
          <input name="email" placeholder="Email" type="email" required />
          <input name="password" placeholder="Password" type="password" required />
          <button type="submit">Login</button>
        </form>
      </section>

      <section class="card">
        <h3>Dashboard</h3>
        <button id="dashboard-btn">Load Dashboard /api/dashboard</button>
      </section>

      <pre id="output">Output appears here.</pre>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
